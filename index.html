<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Shopify Install</title>

<script>

function param(name)
{
    var match = RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
    return match && decodeURIComponent(match[1].replace(/\+/g, ' '));
}

function start()
{
    var shop = param("shop");
    var serial = param("serial");

    if (!shop || !serial)
    {
        document.body.innerHTML = "Missing shop or serial parameter";
        return;
    }

    var service =
      "https://" + serial +
      ".s1cloud.net/s1services/JS/ShopifyV2.Auth/GetClient";

    var xhr = new XMLHttpRequest();

    xhr.open("GET", service, true);

    xhr.onreadystatechange = function ()
    {
        if (xhr.readyState === 4)
        {
            if (xhr.status === 200)
            {
                var result = JSON.parse(xhr.responseText);

                var clientId = result.client_id;

                var redirectUri =
                  "https://" + serial +
                  ".s1cloud.net/s1services/JS/ShopifyV2.Auth/GetAccessToken";

                var state =
                  new Date().getTime();

                var url =
                  "https://" + shop +
                  "/admin/oauth/authorize" +
                  "?client_id=" + clientId +
                  "&redirect_uri=" + encodeURIComponent(redirectUri);

                window.location.replace(url);
            }
            else
            {
                document.body.innerHTML =
                  "Service error: " + xhr.status;
            }
        }
    };

    xhr.send();
}

window.onload = start;

</script>
</head>

<body>
Redirecting to authorization...
</body>
</html>
